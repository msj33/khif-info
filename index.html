<!doctype html>
<html lang="da" class="notranslate" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <meta name="google" content="notranslate" />
  <title>KHIF Info</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;color:#f9fafb}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .critical-screen{width:100vw;height:100vh;display:grid;place-items:center;background:#111827;color:#f9fafb}
    .critical-card{padding:5vw;border-radius:2rem;background:rgba(17,24,39,.62)}
    .critical-card p{color:#f59e0b;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    .critical-card h1{font-size:clamp(2.8rem,7vw,7rem);margin:.25em 0 0;line-height:.95}
    .update-overlay{position:fixed;z-index:99999;inset:0;display:grid;place-items:center;background:rgba(2,6,23,.88);backdrop-filter:blur(10px)}
    .update-overlay.hidden{display:none!important}
    .update-card{width:min(780px,88vw);max-width:min(780px,88vw);border-radius:32px;background:rgba(17,24,39,.98);border:1px solid rgba(255,255,255,.2);box-shadow:0 30px 90px rgba(0,0,0,.52);padding:56px;text-align:center;overflow-wrap:anywhere;word-break:normal}
    .update-card h2{margin:20px 0 10px;font-size:clamp(2rem,4vw,4rem);line-height:1;color:#f9fafb;max-width:100%;overflow-wrap:anywhere;hyphens:auto}
    .update-card p{margin:0;color:rgba(249,250,251,.78);font-size:clamp(1.1rem,2vw,1.8rem);max-width:100%;overflow-wrap:anywhere;hyphens:auto}
    .update-spinner{width:72px;height:72px;border-radius:999px;border:8px solid rgba(255,255,255,.18);border-top-color:#f59e0b;margin:0 auto;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script>
    window.KHIF_BOOT_VERSION="booting";
    async function khifLoadApp(){
      let version=String(Date.now());
      try{const r=await fetch(`./version.json?t=${Date.now()}`,{cache:"no-store"});if(r.ok){const j=await r.json();version=String(j.appVersion||version)}}catch(e){console.warn("Kunne ikke hente version.json",e)}
      window.KHIF_BOOT_VERSION=version;
      const css=document.createElement("link");css.rel="stylesheet";css.href=`./style.css?t=${encodeURIComponent(version)}`;document.head.appendChild(css);
      const js=document.createElement("script");js.src=`./script.js?t=${encodeURIComponent(version)}`;js.defer=true;document.body.appendChild(js);
    }
    khifLoadApp();
  </script>
</head>
<body class="notranslate">
  <main id="app" class="screen critical-screen" aria-live="polite">
    <section class="slide critical-card"><div class="slide-copy"><p class="eyebrow">Indlæser…</p><h1>KHIF Info</h1><p class="body">Henter indhold.</p></div></section>
  </main>
  <div id="updateOverlay" class="update-overlay hidden" aria-live="assertive" aria-hidden="true"><div class="update-card"><div class="update-spinner" aria-hidden="true"></div><h2>Modtager nyhedsopdateringer</h2><p>Infoskærmen opdateres og starter igen fra side 1.</p></div></div>
  <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
</body>
</html>
