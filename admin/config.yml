# Decap CMS config
# VIGTIGT: Ret repo til dit eget GitHub repo, fx msj33/khif-tribune
backend:
  name: github
  repo: msj33/khif-tribune
  branch: main
  # GitHub Pages har ikke indbygget OAuth-backend.
  # Til produktion skal du tilføje en OAuth broker, fx:
  # base_url: https://din-oauth-service.example.com
  # auth_endpoint: /auth

# Gør lokal test mulig med: npx decap-server
local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Infoskærm"
    files:
      - name: "pages"
        label: "Sider"
        file: "content/pages.json"
        format: "json"
        fields:
          - label: "Skift side hvert antal sekunder"
            name: "intervalSeconds"
            widget: "number"
            value_type: "int"
            min: 5
            max: 300
            default: 30
          - label: "Sider - maks 10"
            name: "pages"
            widget: "list"
            max: 10
            summary: "{{fields.title}}"
            fields:
              - { label: "Aktiv", name: "enabled", widget: "boolean", default: true }
              - { label: "Lille overskrift", name: "kicker", widget: "string", required: false }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Tekst", name: "text", widget: "text", required: false }
              - { label: "Footer", name: "footer", widget: "string", required: false }
              - { label: "Baggrundsfarve", name: "backgroundColor", widget: "string", default: "#111827" }
              - { label: "Tekstfarve", name: "textColor", widget: "string", default: "#f9fafb" }
              - { label: "Accentfarve", name: "accentColor", widget: "string", default: "#f59e0b" }
              - { label: "Baggrundsbillede", name: "image", widget: "image", required: false }
