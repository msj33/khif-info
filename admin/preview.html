<!doctype html><html lang="da" class="notranslate" translate="no"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="google" content="notranslate"/><title>KHIF Info Preview 1920×1080</title><style>:root{--bg:#111827;--fg:#f9fafb;--muted:rgba(249,250,251,.78);--accent:#f59e0b;--kicker-size:2.2rem;--title-size:7rem;--text-size:3rem;--footer-size:1.3rem}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.viewport{position:fixed;inset:0;display:grid;place-items:center;background:#020617}.scaled{position:relative}.frame{width:1920px;height:1080px;transform-origin:top left;background:var(--bg);position:absolute;left:0;top:0;overflow:hidden;box-shadow:0 0 0 1px #334155,0 30px 90px rgba(0,0,0,.5)}.frame:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(0,0,0,.58),rgba(0,0,0,.20))}.screen{position:absolute;inset:0;display:grid;place-items:center;padding:96px}.slide{position:relative;z-index:1;width:1720px;min-height:840px;display:grid;grid-template-columns:1fr;align-items:stretch;gap:56px;padding:80px;border-radius:32px;background:rgba(17,24,39,.62);box-shadow:0 12px 36px rgba(0,0,0,.28)}.slide.has-image{grid-template-columns:minmax(0,2fr) minmax(360px,1fr)}.slide-copy{min-width:0;align-self:start;display:flex;flex-direction:column;justify-content:flex-start;gap:32px}.eyebrow{margin:0;color:var(--accent);font-size:var(--kicker-size);font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:var(--title-size);line-height:.95;letter-spacing:-.06em;overflow-wrap:anywhere}.body{margin:0;color:var(--muted);font-size:var(--text-size);line-height:1.18;white-space:pre-line;overflow-wrap:anywhere}.meta{display:flex;gap:16px;align-items:center;color:var(--muted);font-size:var(--footer-size)}.slide-image-wrap{align-self:end;justify-self:end;width:100%;max-width:540px;aspect-ratio:1/1;margin:0;border-radius:22px;overflow:hidden;background:rgba(2,6,23,.35);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center}.slide-image-wrap img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .45s ease}.fade-out{opacity:0}.badge{position:fixed;left:20px;bottom:14px;color:#94a3b8;font-size:13px}.nav{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;background:rgba(2,6,23,.82);padding:10px 12px;border-radius:999px;border:1px solid #334155}.nav button{border:0;border-radius:999px;padding:8px 12px;background:#f59e0b;color:#111827;font-weight:800;cursor:pointer}.nav span{font-size:13px;color:#cbd5e1;min-width:90px;text-align:center}.hidden{display:none}</style></head><body><div class="viewport"><div id="scaled" class="scaled"><div id="frame" class="frame"><main id="screen" class="screen"></main></div></div></div><div id="nav" class="nav hidden"><button id="prev">← Forrige</button><span id="counter"></span><button id="next">Næste →</button></div><div class="badge">Preview simulerer 1920×1080 — skaleret til vinduet</div><script>const payload=JSON.parse(sessionStorage.getItem('khif-preview-data')||'{}');let pages=payload.pages||[payload.page||{}],idx=payload.index||0,imgTimer=null;const cfg=payload.config||{},sizes={kicker:2.2,title:7,text:3,footer:1.3,...(cfg.fontSizes||{})};function esc(v,f=''){return String(v??f).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function imgs(p){return[...(Array.isArray(p.images)?p.images:[]),p.image].filter(Boolean).slice(0,3)}function apply(p){document.documentElement.style.setProperty('--bg',p.backgroundColor||'#111827');document.documentElement.style.setProperty('--fg',p.textColor||'#f9fafb');document.documentElement.style.setProperty('--accent',p.accentColor||'#f59e0b');document.documentElement.style.setProperty('--kicker-size',`${sizes.kicker}rem`);document.documentElement.style.setProperty('--title-size',`${sizes.title}rem`);document.documentElement.style.setProperty('--text-size',`${sizes.text}rem`);document.documentElement.style.setProperty('--footer-size',`${sizes.footer}rem`)}function render(){if(imgTimer)clearInterval(imgTimer);const p=pages[idx]||{};apply(p);const im=imgs(p),has=im.length>0;document.getElementById('screen').innerHTML=`<section class="slide ${has?'has-image':''}"><div class="slide-copy">${p.kicker?`<p class="eyebrow">${esc(p.kicker)}</p>`:''}<h1>${esc(p.title,'Uden titel')}</h1><p class="body">${esc(p.text)}</p><div class="meta"><span>Side ${idx+1} / ${pages.length}</span>${p.footer?`<span>•</span><span>${esc(p.footer)}</span>`:''}</div></div>${has?`<figure class="slide-image-wrap"><img src="${esc(im[0])}" alt=""></figure>`:''}</section>`;document.getElementById('counter').textContent=`${idx+1} / ${pages.length}`;document.getElementById('nav').classList.toggle('hidden',pages.length<=1);if(im.length>1){let ii=0,img=document.querySelector('.slide-image-wrap img');imgTimer=setInterval(()=>{img.classList.add('fade-out');setTimeout(()=>{ii=(ii+1)%im.length;img.src=im[ii];img.classList.remove('fade-out')},260)},30000/im.length)}}function scale(){const s=Math.min((innerWidth-36)/1920,(innerHeight-36)/1080),scaled=document.getElementById('scaled'),frame=document.getElementById('frame');scaled.style.width=`${1920*s}px`;scaled.style.height=`${1080*s}px`;frame.style.transform=`scale(${s})`}document.getElementById('prev').onclick=()=>{idx=(idx-1+pages.length)%pages.length;render()};document.getElementById('next').onclick=()=>{idx=(idx+1)%pages.length;render()};addEventListener('resize',scale);render();scale();</script></body></html>
