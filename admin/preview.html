<!doctype html>
<html lang="da" class="notranslate" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />
  <title>KHIF Info Preview 1920×1080</title>
  <style>
    :root{--bg:#111827;--fg:#f9fafb;--muted:rgba(249,250,251,.78);--accent:#f59e0b;--kicker-size:2.2rem;--title-size:7rem;--text-size:3rem;--footer-size:1.3rem;}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{width:100vw;height:100vh;display:grid;place-items:center;padding:18px}.frame{width:1920px;height:1080px;transform-origin:center center;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 0 1px #334155,0 30px 90px rgba(0,0,0,.5)}.frame:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(0,0,0,.58),rgba(0,0,0,.20))}.screen{position:absolute;inset:0;display:grid;place-items:center;padding:96px}.slide{position:relative;z-index:1;width:1720px;min-height:840px;display:grid;grid-template-columns:1fr;align-items:stretch;gap:56px;padding:80px;border-radius:32px;background:rgba(17,24,39,.62);box-shadow:0 12px 36px rgba(0,0,0,.28)}.slide.has-image{grid-template-columns:minmax(0,2fr) minmax(360px,1fr)}.slide-copy{min-width:0;align-self:start;display:flex;flex-direction:column;justify-content:flex-start;gap:32px}.eyebrow{margin:0;color:var(--accent);font-size:var(--kicker-size);font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:var(--title-size);line-height:.95;letter-spacing:-.06em;overflow-wrap:anywhere}.body{margin:0;color:var(--muted);font-size:var(--text-size);line-height:1.18;white-space:pre-line;overflow-wrap:anywhere}.meta{display:flex;gap:16px;align-items:center;color:var(--muted);font-size:var(--footer-size)}.slide-image-wrap{align-self:end;justify-self:end;width:100%;max-width:540px;aspect-ratio:1/1;margin:0;border-radius:22px;overflow:hidden;background:rgba(2,6,23,.35);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center}.slide-image-wrap img{width:100%;height:100%;object-fit:contain;display:block}.badge{position:fixed;left:20px;bottom:14px;color:#94a3b8;font-size:13px}
  </style>
</head>
<body><div class="wrap"><div id="frame" class="frame"><main id="screen" class="screen"></main></div></div><div class="badge">Preview simulerer 1920×1080 — skaleret til vinduet</div>
<script>
const data=JSON.parse(sessionStorage.getItem('khif-preview-data')||'{}'),page=data.page||{},cfg=data.config||{},sizes={kicker:2.2,title:7,text:3,footer:1.3,...(cfg.fontSizes||{})};function esc(v,f=''){return String(v??f).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function apply(){document.documentElement.style.setProperty('--bg',page.backgroundColor||'#111827');document.documentElement.style.setProperty('--fg',page.textColor||'#f9fafb');document.documentElement.style.setProperty('--accent',page.accentColor||'#f59e0b');document.documentElement.style.setProperty('--kicker-size',`${sizes.kicker}rem`);document.documentElement.style.setProperty('--title-size',`${sizes.title}rem`);document.documentElement.style.setProperty('--text-size',`${sizes.text}rem`);document.documentElement.style.setProperty('--footer-size',`${sizes.footer}rem`)}function render(){apply();const has=!!String(page.image||'').trim();document.getElementById('screen').innerHTML=`<section class="slide ${has?'has-image':''}"><div class="slide-copy">${page.kicker?`<p class="eyebrow">${esc(page.kicker)}</p>`:''}<h1>${esc(page.title,'Uden titel')}</h1><p class="body">${esc(page.text)}</p><div class="meta"><span>Side ${data.pageNumber||1} / ${data.total||1}</span>${page.footer?`<span>•</span><span>${esc(page.footer)}</span>`:''}</div></div>${has?`<figure class="slide-image-wrap"><img src="${esc(page.image)}" alt=""></figure>`:''}</section>`}function scale(){const f=document.getElementById('frame'),s=Math.min((innerWidth-36)/1920,(innerHeight-36)/1080);f.style.transform=`scale(${s})`}addEventListener('resize',scale);render();scale();
</script></body></html>
