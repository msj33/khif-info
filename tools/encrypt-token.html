<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generér KHIF Info secret.js</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:900px;margin:40px auto;padding:0 20px;background:#0f172a;color:#f8fafc} label{display:block;margin:16px 0;color:#cbd5e1} input,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#020617;color:#f8fafc;font:inherit} button{padding:12px 18px;border:0;border-radius:12px;background:#f59e0b;font-weight:800;cursor:pointer} pre{white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:16px;padding:16px} .muted{color:#94a3b8}
  </style>
</head>
<body>
  <h1>Generér admin/secret.js til KHIF Info</h1>
  <p class="muted">Kør denne fil lokalt i browseren. Tokenet sendes ingen steder — kryptering sker kun lokalt.</p>
  <label>Admin brugernavn<input id="username" value="redaktor" /></label>
  <label>Admin password<input id="password" type="password" /></label>
  <label>GitHub fine-grained token<input id="token" type="password" placeholder="github_pat_..." /></label>
  <button id="generate">Generér secret.js</button>
  <h2>Output</h2>
  <p class="muted">Kopier hele outputtet til <code>admin/secret.js</code> og commit filen.</p>
  <pre id="output"></pre>
<script>
const iterations = 250000;
function bytesToB64(bytes){let s='';bytes.forEach(b=>s+=String.fromCharCode(b));return btoa(s)}
async function deriveKey(password, salt){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations, hash:'SHA-256' }, baseKey, { name:'AES-GCM', length:256 }, false, ['encrypt']);
}
document.querySelector('#generate').addEventListener('click', async () => {
  const username = document.querySelector('#username').value.trim() || 'redaktor';
  const password = document.querySelector('#password').value;
  const token = document.querySelector('#token').value.trim();
  if (!password || !token) { alert('Udfyld både password og GitHub token.'); return; }
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, new TextEncoder().encode(token));
  const js = `// Genereret lokalt med tools/encrypt-token.html
window.KHIF_ADMIN_SECRET = {
  owner: "msj33",
  repo: "khif-info",
  branch: "main",
  contentPath: "content/pages.json",
  adminUsername: ${JSON.stringify(username)},
  iterations: ${iterations},
  salt: "${bytesToB64(salt)}",
  iv: "${bytesToB64(iv)}",
  encryptedToken: "${bytesToB64(new Uint8Array(encrypted))}"
};
`;
  document.querySelector('#output').textContent = js;
});
</script>
</body>
</html>
